<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="lgBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="lgHandle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="50%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="lgFlame1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="lgFlame2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="60%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fde047"/>
    </linearGradient>
    <linearGradient id="lgFlame3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="lgFlameGlow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#lgBg)"/>
  <!-- torch handle -->
  <rect x="13" y="25" width="6" height="5" rx="1.5" fill="url(#lgHandle)"/>
  <rect x="11" y="27" width="10" height="3" rx="1.5" fill="#334155"/>
  <!-- flame as performance bars -->
  <rect x="6" y="17" width="5" height="9" rx="2" fill="url(#lgFlame1)" opacity=".85"/>
  <rect x="13.5" y="10" width="5" height="16" rx="2" fill="url(#lgFlame2)" filter="url(#lgFlameGlow)"/>
  <rect x="21" y="5" width="5" height="21" rx="2" fill="url(#lgFlame3)" filter="url(#lgFlameGlow)"/>
  <circle cx="23.5" cy="5" r="2" fill="#fde047" opacity=".95"/>
  <circle cx="15.5" cy="10" r="1.5" fill="#fde047" opacity=".7"/>
  <circle cx="8.5" cy="17" r="1.2" fill="#fbbf24" opacity=".7"/>
</svg>